services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly no --save ""
    networks:
      - backend

  kafka1:
    image: apache/kafka:latest
    container_name: kafka1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka1:9092,CONTROLLER://kafka1:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9095
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9092:9092"
    networks:
      - backend

  kafka2:
    image: apache/kafka:latest
    container_name: kafka2
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka2:9094,CONTROLLER://kafka2:9095
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9095
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9094:9094"
    networks:
      - backend
    depends_on:
      - kafka1

  kafka-ui:
    profiles: ["tools"]
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "TRUE"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:9092,kafka2:9094
    depends_on:
      - kafka1
      - kafka2
    networks:
      - backend

  df:
    build:
      context: ..
      dockerfile: services/dataForwardingService/Dockerfile
    container_name: df
    depends_on:
      - redis
      - kafka1
      - kafka2
    environment:
      PORT: 54342
      PGSQL_DSN: ${PGSQL_DSN}
      REDIS_ADDR: redis:6379
      KAFKA_BROKER: kafka1:9092,kafka2:9094
      AUTH_RPC_ADDR: auth_service:50051
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - "54342:54342"
    networks:
      - backend

  df2:
    profiles: ["redundancy"]
    build:
      context: ..
      dockerfile: services/dataForwardingService/Dockerfile
    container_name: df2
    depends_on:
      - redis
      - kafka1
      - kafka2
    environment:
      PORT: 54343
      PGSQL_DSN: ${PGSQL_DSN}
      REDIS_ADDR: redis:6379
      KAFKA_BROKER: kafka1:9092,kafka2:9094
      AUTH_RPC_ADDR: auth_service:50051
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - "54343:54343"
    networks:
      - backend

  auth_service:
    build:
      context: ..
      dockerfile: services/authService/Dockerfile
    container_name: authService
    environment:
      PORT: 50051
      PGSQL_DSN: ${PGSQL_DSN}
    ports:
      - "50051:50051"
    networks:
      - backend

  rustfs:
    profiles: ["storage"]
    image: rustfs/rustfs:latest
    container_name: rustfs
    ports:
      - "9000:9000"  # S3 API端口
      - "9001:9001"  # 控制台端口
    volumes:
      - rustfs-data:/data
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    command:
      - --address
      - :9000
      - --console-enable
      - --access-key
      - ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - --secret-key
      - ${RUSTFS_SECRET_KEY:-rustfsadmin}
      - /data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  storage_service:
    profiles: ["storage"]
    build:
      context: ..
      dockerfile: services/storageService/Dockerfile
    container_name: storageService
    depends_on:
      rustfs:
        condition: service_started
      redis:
        condition: service_started
      kafka1:
        condition: service_started
      kafka2:
        condition: service_started
    environment:
      PGSQL_DSN: ${PGSQL_DSN}
      REDIS_ADDR: redis:6379
      KAFKA_BROKER: kafka1:9092,kafka2:9094
      KAFKA_STORAGE_TOPIC: storage-service
      KAFKA_CONSUMER_GROUP: storage-service-group
      AUTH_RPC_ADDR: auth_service:50051
      HTTP_PORT: ${HTTP_PORT:-8081}
      # RustFS配置
      RUSTFS_REGION: ${RUSTFS_REGION:-cn-east-1}
      RUSTFS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_ENDPOINT_URL: http://rustfs:9000
      RUSTFS_EXTERNAL_ENDPOINT_URL: ${RUSTFS_EXTERNAL_ENDPOINT_URL:-}
      RUSTFS_EXTERNAL_PORT: ${RUSTFS_EXTERNAL_PORT:-9000}
      RUSTFS_BUCKET: ${RUSTFS_BUCKET:-betterfly-files}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - "${HTTP_PORT:-8081}:${HTTP_PORT:-8081}"
    networks:
      - backend

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - backend
  grafana:
    profiles: ["observability"]
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - backend
    depends_on:
      - prometheus

  friend_service:
    build:
      context: ..
      dockerfile: services/friendService/Dockerfile
    container_name: friendService
    environment:
      KAFKA_BROKER: kafka1:9092,kafka2:9094
      PORT: 54401
      PGSQL_DSN: ${PGSQL_DSN}
    ports:
      - "54401:54401"
    networks:
      - backend

  abtest_service:
    profiles: ["experiments"]
    build:
      context: ..
      dockerfile: services/abTestService/Dockerfile
    container_name: abTestService
    environment:
      PORT: ${ABTEST_HTTP_PORT:-8082}
      PGSQL_DSN: ${PGSQL_DSN}
      ABTEST_ADMIN_TOKEN: ${ABTEST_ADMIN_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - "${ABTEST_HTTP_PORT:-8082}:${ABTEST_HTTP_PORT:-8082}"
    networks:
      - backend

  call_service:
    profiles: ["calls"]
    build:
      context: ..
      dockerfile: services/callService/Dockerfile
    container_name: callService
    environment:
      HTTP_PORT: ${CALL_HTTP_PORT:-8085}
      REDIS_ADDR: redis:6379
      KAFKA_BROKER: kafka1:9092,kafka2:9094
      KAFKA_CALL_TOPIC: call-service
      KAFKA_CONSUMER_GROUP: call-service-group
      CALL_RING_TIMEOUT_SECONDS: ${CALL_RING_TIMEOUT_SECONDS:-45}
      CALL_ACTIVE_TTL_SECONDS: ${CALL_ACTIVE_TTL_SECONDS:-21600}
      TURN_PUBLIC_HOST: ${TURN_PUBLIC_HOST:-localhost}
      CALL_STUN_URLS: ${CALL_STUN_URLS:-}
      CALL_TURN_URLS: ${CALL_TURN_URLS:-}
      TURN_SHARED_SECRET: ${TURN_SHARED_SECRET:-betterfly-dev-turn-secret}
      TURN_CREDENTIAL_TTL_SECONDS: ${TURN_CREDENTIAL_TTL_SECONDS:-3600}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - "${CALL_HTTP_PORT:-8085}:${CALL_HTTP_PORT:-8085}"
    depends_on:
      - redis
      - kafka1
      - kafka2
      - push_service
    networks:
      - backend

  push_service:
    profiles: ["notifications", "calls"]
    build:
      context: ..
      dockerfile: services/pushService/Dockerfile
    container_name: pushService
    environment:
      HTTP_PORT: ${PUSH_HTTP_PORT:-8086}
      PGSQL_DSN: ${PGSQL_DSN}
      KAFKA_BROKER: kafka1:9092,kafka2:9094
      KAFKA_PUSH_TOPIC: push-service
      KAFKA_CONSUMER_GROUP: push-service-group
      APNS_KEY_ID: ${APNS_KEY_ID:-C6D5695Q4Y}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-8R5Q4A3RC7}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-com.Voltline.Betterfly2}
      APNS_PRIVATE_KEY_BASE64: ${APNS_PRIVATE_KEY_BASE64:-}
      APNS_PRIVATE_KEY_PATH: /run/secrets/apns_key.p8
      PUSH_ADMIN_TOKEN: ${PUSH_ADMIN_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - "${PUSH_HTTP_PORT:-8086}:${PUSH_HTTP_PORT:-8086}"
    depends_on:
      - kafka1
      - kafka2
    volumes:
      - "${APNS_PRIVATE_KEY_HOST_PATH:-/dev/null}:/run/secrets/apns_key.p8:ro"
    networks:
      - backend

  coturn:
    profiles: ["calls"]
    image: coturn/coturn:latest
    container_name: coturn
    command:
      - --no-cli
      - --log-file=stdout
      - --fingerprint
      - --realm=${TURN_REALM:-betterfly.local}
      - --use-auth-secret
      - --static-auth-secret=${TURN_SHARED_SECRET:-betterfly-dev-turn-secret}
      - --external-ip=${TURN_EXTERNAL_IP:-127.0.0.1}
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  grafana-storage:
  rustfs-data:
