apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-forwarding
  namespace: betterfly2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-forwarding
  template:
    metadata:
      labels:
        app: data-forwarding
    spec:
      initContainers:
        - name: ensure-data-forwarding-dlq
          image: apache/kafka:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: betterfly2-config
          command:
            - /bin/bash
            - -ec
            - |
              until /opt/kafka/bin/kafka-topics.sh \
                --bootstrap-server "${KAFKA_BROKER}" --list >/dev/null 2>&1; do
                echo "waiting for Kafka"
                sleep 2
              done
              /opt/kafka/bin/kafka-topics.sh \
                --bootstrap-server "${KAFKA_BROKER}" \
                --create --if-not-exists \
                --topic "${DF_KAFKA_DLQ_TOPIC}" \
                --partitions "${DF_KAFKA_DLQ_PARTITIONS}" \
                --replication-factor "${DF_KAFKA_DLQ_REPLICATION_FACTOR}"
              /opt/kafka/bin/kafka-configs.sh \
                --bootstrap-server "${KAFKA_BROKER}" \
                --alter --entity-type topics --entity-name "${DF_KAFKA_DLQ_TOPIC}" \
                --add-config "cleanup.policy=delete,retention.ms=${DF_KAFKA_DLQ_RETENTION_MS},min.insync.replicas=${DF_KAFKA_DLQ_MIN_ISR}"
              /opt/kafka/bin/kafka-topics.sh \
                --bootstrap-server "${KAFKA_BROKER}" \
                --describe --topic "${DF_KAFKA_DLQ_TOPIC}"
      containers:
        - name: data-forwarding
          image: betterfly2/data-forwarding-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: betterfly2-config
          env:
            - name: PORT
              value: "54342"
            - name: DB_MAX_OPEN_CONNS
              value: "12"
            - name: DB_MAX_IDLE_CONNS
              value: "4"
            - name: PGSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: betterfly2-secret
                  key: PGSQL_DSN
          ports:
            - name: websocket
              containerPort: 54342
          readinessProbe:
            tcpSocket:
              port: websocket
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: data-forwarding
  namespace: betterfly2
spec:
  selector:
    app: data-forwarding
  ports:
    - name: websocket
      port: 54342
      targetPort: websocket
