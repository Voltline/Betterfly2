syntax = "proto3";
package friend_interface;
option go_package = "Betterfly2/proto/friend";

message AddDirectFriend {
  int64 user_id = 1;
  int64 friend_id = 2;
  string message = 3;
}

enum RequestDecision {
  REQUEST_DECISION_UNSPECIFIED = 0;
  REQUEST_ACCEPT = 1;
  REQUEST_REJECT = 2;
  REQUEST_CANCEL = 3;
}

message QueryFriendRequests {
  int64 user_id = 1;
  bool include_outgoing = 2;
}

message ResolveFriendRequest {
  int64 user_id = 1;
  int64 request_id = 2;
  RequestDecision decision = 3;
}

message QueryFriendList {
  int64 user_id = 1;
}

message RemoveDirectFriend {
  int64 user_id = 1;
  int64 friend_id = 2;
}

message UpdateFriendAlias {
  int64 user_id = 1;
  int64 friend_id = 2;
  string alias = 3;
}

message UpdateFriendNotify {
  int64 user_id = 1;
  int64 friend_id = 2;
  bool is_notify = 3;
}

message CreateGroup {
  int64 owner_user_id = 1;
  int64 group_id = 2;
  string group_name = 3;
}

message QueryGroup {
  int64 request_user_id = 1;
  int64 group_id = 2;
  bool client_need_save = 3;
}

message AddGroupMember {
  int64 user_id = 1;
  int64 group_id = 2;
  string message = 3;
}

message QueryGroupJoinRequests {
  int64 request_user_id = 1;
  int64 group_id = 2;
}

message ResolveGroupJoinRequest {
  int64 request_user_id = 1;
  int64 request_id = 2;
  RequestDecision decision = 3;
}

message InviteGroupMember {
  int64 request_user_id = 1;
  int64 group_id = 2;
  int64 user_id = 3;
  string message = 4;
}

message QueryGroupInvitations {
  int64 user_id = 1;
  bool include_outgoing = 2;
}

message ResolveGroupInvitation {
  int64 user_id = 1;
  int64 invitation_id = 2;
  RequestDecision decision = 3;
}

message KickGroupMember {
  int64 request_user_id = 1;
  int64 group_id = 2;
  int64 user_id = 3;
}

message UpdateGroupMemberRole {
  int64 request_user_id = 1;
  int64 group_id = 2;
  int64 user_id = 3;
  string role = 4;
}

message QueryGroupMembers {
  int64 request_user_id = 1;
  int64 group_id = 2;
}

message QueryJoinedGroups {
  int64 user_id = 1;
}

message RemoveGroupMember {
  int64 request_user_id = 1;
  int64 group_id = 2;
  int64 user_id = 3;
}

message UpdateGroupAvatar {
  int64 request_user_id = 1;
  int64 group_id = 2;
  string avatar_hash = 3;
}

message FriendRelationRsp {
  int64 user_id = 1;
  int64 friend_id = 2;
  bool is_friend = 3;
  string update_time = 4;
}

message FriendContact {
  int64 user_id = 1;
  string account = 2;
  string name = 3;
  string avatar = 4;
  string alias = 5;
  bool is_notify = 6;
  string update_time = 7;
}

message FriendListRsp {
  repeated FriendContact contacts = 1;
}

message FriendOperationRsp {
  string operation = 1;
  int64 user_id = 2;
  int64 friend_id = 3;
  string update_time = 4;
}

message GroupInfoRsp {
  int64 group_id = 1;
  string group_name = 2;
  string avatar = 3;
  int64 owner_user_id = 4;
  string update_time = 5;
  bool client_need_save = 6;
}

message GroupOperationRsp {
  string operation = 1;
  int64 group_id = 2;
  int64 user_id = 3;
  string update_time = 4;
  string role = 5;
}

message GroupMemberContact {
  int64 user_id = 1;
  string account = 2;
  string name = 3;
  string avatar = 4;
  string role = 5;
  string update_time = 6;
}

message GroupMemberListRsp {
  int64 group_id = 1;
  repeated GroupMemberContact members = 2;
}

message JoinedGroupContact {
  int64 group_id = 1;
  string group_name = 2;
  string avatar = 3;
  int64 owner_user_id = 4;
  string update_time = 5;
}

message JoinedGroupListRsp {
  repeated JoinedGroupContact groups = 1;
}

message RelationshipRequestInfo {
  int64 request_id = 1;
  string request_type = 2;
  int64 requester_user_id = 3;
  string requester_name = 4;
  string requester_avatar = 5;
  int64 target_user_id = 6;
  string target_name = 7;
  string target_avatar = 8;
  int64 group_id = 9;
  string group_name = 10;
  string group_avatar = 11;
  string message = 12;
  string status = 13;
  string created_at = 14;
  string expires_at = 15;
  string resolved_at = 16;
  int64 resolved_by = 17;
}

message RelationshipRequestListRsp {
  repeated RelationshipRequestInfo requests = 1;
}

message RelationshipOperationRsp {
  string operation = 1;
  RelationshipRequestInfo request = 2;
}

enum FriendResult {
  FRIEND_OK = 0;
  RECORD_NOT_EXIST = 1;
  ALREADY_FRIEND = 2;
  INVALID_ARGUMENT = 3;
  ALREADY_EXIST = 4;
  REQUEST_PENDING = 5;
  REQUEST_EXPIRED = 6;
  FORBIDDEN = 7;
  INVALID_STATE = 8;
  SERVICE_ERROR = 10;
}

message RequestMessage {
  string from_kafka_topic = 1;
  int64 target_user_id = 2;

  oneof payload {
    AddDirectFriend add_direct_friend = 3;
    QueryFriendList query_friend_list = 4;
    RemoveDirectFriend remove_direct_friend = 5;
    UpdateFriendAlias update_friend_alias = 6;
    UpdateFriendNotify update_friend_notify = 7;
    CreateGroup create_group = 8;
    QueryGroup query_group = 9;
    AddGroupMember add_group_member = 10;
    UpdateGroupAvatar update_group_avatar = 11;
    QueryGroupMembers query_group_members = 12;
    RemoveGroupMember remove_group_member = 13;
    QueryJoinedGroups query_joined_groups = 14;
    QueryFriendRequests query_friend_requests = 15;
    ResolveFriendRequest resolve_friend_request = 16;
    QueryGroupJoinRequests query_group_join_requests = 17;
    ResolveGroupJoinRequest resolve_group_join_request = 18;
    InviteGroupMember invite_group_member = 19;
    QueryGroupInvitations query_group_invitations = 20;
    ResolveGroupInvitation resolve_group_invitation = 21;
    KickGroupMember kick_group_member = 22;
    UpdateGroupMemberRole update_group_member_role = 23;
  }
}

message ResponseMessage {
  FriendResult result = 1;
  int64 target_user_id = 2;

  oneof payload {
    FriendRelationRsp friend_relation_rsp = 3;
    FriendListRsp friend_list_rsp = 4;
    FriendOperationRsp friend_operation_rsp = 5;
    GroupInfoRsp group_info_rsp = 6;
    GroupOperationRsp group_operation_rsp = 7;
    GroupMemberListRsp group_member_list_rsp = 8;
    JoinedGroupListRsp joined_group_list_rsp = 9;
    RelationshipRequestListRsp relationship_request_list_rsp = 10;
    RelationshipOperationRsp relationship_operation_rsp = 11;
  }
}
