apiVersion: apps/v1
kind: Deployment
metadata:
  name: abtest-service
  namespace: betterfly2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: abtest-service
  template:
    metadata:
      labels:
        app: abtest-service
    spec:
      containers:
        - name: abtest-service
          image: betterfly2/abtest-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: betterfly2-config
          env:
            - name: PORT
              value: "8082"
            - name: PGSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: betterfly2-secret
                  key: PGSQL_DSN
            - name: ABTEST_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: betterfly2-secret
                  key: ABTEST_ADMIN_TOKEN
                  optional: true
          ports:
            - name: http
              containerPort: 8082
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: abtest-service
  namespace: betterfly2
spec:
  selector:
    app: abtest-service
  ports:
    - name: http
      port: 8082
      targetPort: http
