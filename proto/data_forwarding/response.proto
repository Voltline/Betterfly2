syntax = "proto3";
package df_interface;
option go_package = "Betterfly2/proto/data_forwarding";

enum LoginResult {
  LOGIN_OK = 0;
  ACCOUNT_NOT_EXIST = 1;
  PASSWORD_ERROR = 2;
  JWT_ERROR = 3;
  LOGIN_SVR_ERROR = 10;
}

enum SignupResult {
  SIGNUP_OK = 0;
  ACCOUNT_EXIST = 1;
  ACCOUNT_EMPTY = 2;
  PASSWORD_EMPTY = 3;
  ACCOUNT_TOO_LONG = 4;
  SIGNUP_SVR_ERROR = 10;
}

message LoginRsp {
  LoginResult result = 1;
  int64 user_id = 2;
  string jwt = 3;
}

message SignupRsp {
  SignupResult result = 1;
}

message Refused { // 就是空的
}

message Server {
  string server_msg = 1;
}

message Warn {
  string warning_message = 1;
}

message PostAckRsp {
  int64 message_id = 1;
  string client_message_id = 2; // 与Post.client_message_id对应，客户端据此匹配乱序ACK
}

message UserInfo {
  int64 send_to_user_id = 1;
  string query_user_name = 2;
  int64 user_id = 3;
  string account = 4;
  string name = 5;
  string avatar = 6;
  string update_time = 7;
}

message ContactInfo {
  int64 user_id = 1;
  string account = 2;
  string name = 3;
  string avatar = 4;
  string alias = 5;
  bool is_notify = 6;
  string update_time = 7;
}

message ContactListRsp {
  repeated ContactInfo contacts = 1;
}

message GroupInfo {
  bool client_need_save = 1; // 对于原先的msg字段, 0保存，1不保存
  int64 query_group_id = 2;
  string query_group_name = 3;
  string avatar = 4;
}

message GroupMemberInfo {
  int64 user_id = 1;
  string account = 2;
  string name = 3;
  string avatar = 4;
  string role = 5;
  string update_time = 6;
}

message GroupMembersRsp {
  int64 group_id = 1;
  repeated GroupMemberInfo members = 2;
}

message JoinedGroupInfo {
  int64 group_id = 1;
  string group_name = 2;
  string avatar = 3;
  int64 owner_user_id = 4;
  string update_time = 5;
}

message JoinedGroupsRsp {
  repeated JoinedGroupInfo groups = 1;
}

message RelationshipRequestInfo {
  int64 request_id = 1;
  string request_type = 2; // friend/group_join/group_invite
  int64 requester_user_id = 3;
  string requester_name = 4;
  string requester_avatar = 5;
  int64 target_user_id = 6;
  string target_name = 7;
  string target_avatar = 8;
  int64 group_id = 9;
  string group_name = 10;
  string group_avatar = 11;
  string message = 12;
  string status = 13;
  string created_at = 14;
  string expires_at = 15;
  string resolved_at = 16;
  int64 resolved_by = 17;
}

message RelationshipRequestListRsp {
  repeated RelationshipRequestInfo requests = 1;
}

message RelationshipOperationRsp {
  string operation = 1;
  string result = 2;
  RelationshipRequestInfo request = 3;
}

message GroupMemberOperationRsp {
  string operation = 1;
  string result = 2;
  int64 group_id = 3;
  int64 user_id = 4;
  string role = 5;
  string update_time = 6;
  string group_name = 7;
  int64 previous_owner_user_id = 8;
}

enum AccountSecurityResult {
  ACCOUNT_SECURITY_OK = 0;
  ACCOUNT_SECURITY_OLD_PASSWORD_ERROR = 1;
  ACCOUNT_SECURITY_JWT_ERROR = 2;
  ACCOUNT_SECURITY_PASSWORD_TOO_SHORT = 3;
  ACCOUNT_SECURITY_PASSWORD_TOO_LONG = 4;
  ACCOUNT_SECURITY_SERVICE_ERROR = 10;
}

message AccountSecurityRsp {
  string operation = 1;
  AccountSecurityResult result = 2;
  string jwt = 3;
}

// 单条消息响应
message MessageRsp {
  int64 from_user_id = 1;
  int64 to_user_id = 2;
  string content = 3;
  string timestamp = 4;
  string msg_type = 5;
  bool is_group = 6;
  string real_file_name = 7;
  int64 message_id = 8;
  bool is_recalled = 9;
  string recalled_at = 10;
  int64 recalled_by = 11;
}

// 同步消息响应
message SyncMessagesRsp {
  repeated MessageRsp msgs = 1;
  bool has_more = 2;
  string next_cursor_timestamp = 3;
  int64 next_cursor_message_id = 4;
}
