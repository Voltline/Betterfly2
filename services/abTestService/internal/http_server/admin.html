<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Betterfly2 ABTest Console</title>
  <style>
    :root {
      --ink: #18231f;
      --muted: #6f7b73;
      --panel: rgba(255, 252, 244, .94);
      --line: #dfd0b7;
      --green: #285f58;
      --green-2: #dceee6;
      --amber: #a86d1e;
      --red: #9c3d2e;
      --shadow: 0 22px 70px rgba(50, 43, 31, .14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 191, 91, .28), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(63, 127, 113, .24), transparent 38rem),
        linear-gradient(135deg, #f6efe1 0%, #e6efe9 100%);
      min-height: 100vh;
    }
    .shell { min-height: 100vh; }
    aside {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(220px, .8fr) auto minmax(320px, .9fr);
      gap: 16px;
      align-items: center;
      padding: 14px 22px;
      border-bottom: 1px solid rgba(40, 95, 88, .18);
      background: rgba(32, 48, 42, .92);
      color: #f7efe2;
      box-shadow: 0 14px 48px rgba(28, 38, 33, .14);
      backdrop-filter: blur(18px);
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-mark { width: 34px; height: 34px; flex: 0 0 34px; border-radius: 12px; background: linear-gradient(135deg, #f2b35f, #79b7a6); box-shadow: inset 0 0 0 1px rgba(255,255,255,.35); }
    .brand h1 { margin: 0; font-size: 19px; line-height: 1.1; letter-spacing: 0; }
    .brand p { margin: 3px 0 0; color: rgba(247, 239, 226, .72); font-size: 12px; line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nav-row { display: flex; gap: 8px; justify-content: center; }
    .nav-button {
      display: inline-flex;
      width: auto;
      border: 0;
      border-radius: 999px;
      padding: 9px 13px;
      margin: 0;
      text-align: center;
      color: #f7efe2;
      background: transparent;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      transition: background .16s ease, transform .16s ease;
    }
    .nav-button:hover, .nav-button.active { background: rgba(255, 255, 255, .13); transform: translateY(-1px); }
    .token-box { display: grid; grid-template-columns: minmax(0, 1fr) 170px auto; gap: 8px; align-items: center; padding: 9px; border-radius: 16px; background: rgba(255, 255, 255, .1); }
    .token-box p { margin: 0; color: rgba(247, 239, 226, .72); font-size: 11px; line-height: 1.35; }
    .token-box .actions { margin: 0; flex-wrap: nowrap; }
    .token-box input { padding: 9px 10px; border-radius: 12px; }
    main { padding: 22px; max-width: 1500px; margin: 0 auto; }
    .topbar { display: flex; align-items: end; justify-content: space-between; gap: 22px; margin-bottom: 14px; }
    .eyebrow { color: var(--amber); font-weight: 900; letter-spacing: .12em; font-size: 12px; text-transform: uppercase; }
    .page-title { margin: 4px 0 0; font-size: clamp(28px, 3vw, 40px); line-height: 1; letter-spacing: 0; }
    .subtitle { margin: 0; max-width: 820px; color: var(--muted); line-height: 1.65; }
    .panel {
      background: var(--panel);
      border: 1px solid rgba(223, 208, 183, .9);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .view { display: none; animation: rise .24s ease both; }
    .view.active { display: block; }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 12px; }
    .stat { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; padding: 12px 14px; border-radius: 18px; background: linear-gradient(145deg, #fffdf8, #edf5ef); border: 1px solid rgba(223, 208, 183, .72); }
    .stat span { color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; }
    .stat strong { display: block; font-size: 24px; letter-spacing: 0; }
    .toolbar { display: flex; gap: 10px; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .search { max-width: 420px; }
    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 22px; background: #fffdf8; }
    table { width: 100%; border-collapse: collapse; min-width: 980px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #eadfcc; text-align: left; vertical-align: middle; font-size: 12px; }
    th { color: #5f6b64; background: #f3eadb; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; }
    tbody tr { cursor: pointer; transition: background .15s ease; }
    tbody tr:hover { background: #f5fbf6; }
    tbody tr.selected { background: #e8f3ed; }
    .key-cell strong { display: block; font-size: 14px; color: var(--ink); }
    .key-cell span { display: block; margin-top: 3px; color: var(--muted); }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 5px 9px; font-size: 12px; font-weight: 900; background: #eee6d8; color: #604a27; }
    .badge.running { background: var(--green-2); color: var(--green); }
    .badge.paused { background: #fff0cf; color: #8a5b00; }
    .badge.stopped { background: #f6d8d1; color: var(--red); }
    .badge.draft { background: #e8e8e8; color: #555; }
    .progress { height: 10px; border-radius: 999px; overflow: hidden; background: #eee4d4; margin: 4px 0; min-width: 120px; }
    .progress > i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--green), #e0a348); }
    .detail-title { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .detail-title h2 { margin: 0; font-size: 28px; letter-spacing: 0; }
    .kv { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 9px; margin: 13px 0; }
    .kv div { padding: 10px 12px; border-radius: 14px; background: rgba(237, 245, 239, .75); }
    .kv span { display: block; color: var(--muted); font-size: 12px; font-weight: 800; }
    .kv strong { display: block; margin-top: 5px; font-size: 15px; word-break: break-word; }
    .group-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 12px; }
    .group-row { padding: 13px; border-radius: 16px; background: #fffdf8; border: 1px solid var(--line); }
    .group-row header { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-weight: 900; }
    .group-panel { display: grid; gap: 10px; padding: 14px; border-radius: 18px; background: #fffdf8; border: 1px solid var(--line); }
    .group-panel header { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .group-panel h4 { margin: 0; font-size: 17px; }
    .group-editor { display: grid; grid-template-columns: minmax(0, 1fr) 120px; gap: 10px; }
    .group-panel textarea { min-height: 110px; }
    .assignment-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 30px; padding: 8px; border: 1px dashed #d6c6ad; border-radius: 13px; background: #fffaf0; }
    .assignment-chip { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 5px 8px; background: #e8f3ed; color: var(--green); font-size: 12px; font-weight: 900; }
    .assignment-chip button { padding: 2px 6px; box-shadow: none; background: transparent; color: var(--red); }
    .inline-add { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; }
    .config-preview { max-height: 220px; overflow: auto; }
    .detail-section { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line); }
    .inline-duration { display: grid; grid-template-columns: 1fr 140px; gap: 10px; }
    label { display: block; margin: 13px 0 6px; font-weight: 900; color: #31433c; }
    input, textarea, select {
      width: 100%;
      border: 1px solid #d4c5ad;
      border-radius: 14px;
      padding: 12px 13px;
      background: #fffefb;
      color: var(--ink);
      font: inherit;
      outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--green); box-shadow: 0 0 0 4px rgba(40, 95, 88, .12); }
    textarea { min-height: 120px; font-family: "SF Mono", "Menlo", "Consolas", monospace; font-size: 13px; line-height: 1.45; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .actions { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 14px; }
    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: var(--green);
      color: white;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      box-shadow: 0 9px 24px rgba(40, 95, 88, .18);
    }
    button.secondary { background: #7a5c31; }
    button.soft { background: #e6ded0; color: #4f3d22; box-shadow: none; }
    button.danger { background: var(--red); }
    pre, code { font-family: "SF Mono", "Menlo", "Consolas", monospace; }
    pre { padding: 14px; border-radius: 18px; background: #1f2a25; color: #f7efe2; overflow: auto; font-size: 12px; line-height: 1.45; }
    .result { max-height: 300px; white-space: pre-wrap; }
    .empty { padding: 24px; border: 1px dashed #cab89d; border-radius: 18px; color: var(--muted); text-align: center; }
    @media (max-width: 980px) {
      aside { position: relative; grid-template-columns: 1fr; align-items: stretch; }
      .brand p { white-space: normal; }
      .nav-row { justify-content: flex-start; flex-wrap: wrap; }
      .token-box { grid-template-columns: 1fr; }
      .topbar { display: block; }
      .stats, .form-grid, .kv, .group-list, .group-editor { grid-template-columns: 1fr; }
      main { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <h1>ABTest Console</h1>
          <p>统一配置客户端与未来服务端实验。</p>
        </div>
      </div>
      <div class="nav-row">
        <button class="nav-button active" data-view="dashboard" onclick="showView('dashboard')">实验列表</button>
        <button class="nav-button" data-view="create" onclick="showView('create')">新增实验</button>
        <button class="nav-button" data-view="debug" onclick="showView('debug')">请求结果</button>
      </div>
      <div class="token-box">
        <p>{{.TokenHint}}</p>
        <input id="token" placeholder="ABTEST_ADMIN_TOKEN">
        <div class="actions">
          <button class="soft" onclick="saveToken()">保存</button>
          <button class="soft" onclick="loadExperiments()">刷新</button>
        </div>
      </div>
    </aside>

    <main>
      <div class="topbar">
        <div class="eyebrow">Betterfly2 Experiment Platform</div>
        <h2 class="page-title">实验控制台</h2>
        <p class="subtitle">总览页只展示所有实验的缩略信息；点击某一行后进入详情页，查看并修改实验参数、分组配置和例外设备。所有展示时间均转换为 UTC+8。</p>
      </div>

      <section id="view-dashboard" class="view active">
        <div class="stats">
          <div class="stat"><span>全部实验</span><strong id="stat-total">0</strong></div>
          <div class="stat"><span>运行中</span><strong id="stat-running">0</strong></div>
          <div class="stat"><span>草稿</span><strong id="stat-draft">0</strong></div>
          <div class="stat"><span>已暂停/停止</span><strong id="stat-inactive">0</strong></div>
        </div>
        <div class="panel">
          <div class="toolbar">
            <h2>实验列表</h2>
            <input id="search" class="search" placeholder="搜索 key / 名称 / 类型 / 状态" oninput="renderExperiments()">
          </div>
          <div id="experiments" class="empty">正在加载实验...</div>
        </div>
      </section>

      <section id="view-detail" class="view">
        <div class="panel" id="detail">
          <div class="empty">请回到实验列表选择一个实验。</div>
        </div>
      </section>

      <section id="view-create" class="view">
        <div class="panel">
          <h2>新增实验</h2>
          <div class="form-grid">
            <div>
              <label for="experiment_key">实验 Key</label>
              <input id="experiment_key" placeholder="new_chat_ui">
            </div>
            <div>
              <label for="name">实验名称</label>
              <input id="name" placeholder="新聊天页">
            </div>
            <div>
              <label for="experiment_type">实验类型</label>
              <select id="experiment_type">
                <option value="client">client</option>
                <option value="server">server</option>
                <option value="all">all</option>
              </select>
            </div>
            <div>
              <label for="duration_value">持续时间</label>
              <div class="inline-duration">
                <input id="duration_value" type="number" value="7" min="1">
                <select id="duration_unit">
                  <option value="second">秒</option>
                  <option value="minute">分钟</option>
                  <option value="hour">小时</option>
                  <option value="day" selected>天</option>
                </select>
              </div>
            </div>
            <div>
              <label for="status">初始状态</label>
              <select id="status">
                <option value="draft">draft</option>
                <option value="running">running</option>
                <option value="paused">paused</option>
              </select>
            </div>
            <div>
              <label for="start_time">开始时间（UTC+8）</label>
              <input id="start_time" type="datetime-local">
            </div>
          </div>
          <label for="description">说明</label>
          <input id="description" placeholder="实验目标、风险说明或回滚方式">
          <label for="targeting">Targeting JSON</label>
          <p class="meta">后续可以升级成类 Python 的筛选表达式；当前仍使用 JSON 保存，避免现在引入规则解释器风险。</p>
          <textarea id="targeting">{"platforms":["ios"],"min_app_version":"1.0.0"}</textarea>
          <label for="groups">分组 JSON 数组</label>
          <textarea id="groups">[
  {"group_key":"control","traffic_basis_points":5000,"config":{"enable_new_chat_ui":false}},
  {"group_key":"variant","traffic_basis_points":5000,"config":{"enable_new_chat_ui":true}}
]</textarea>
          <div class="actions">
            <button onclick="createExperiment()">创建实验</button>
            <button class="soft" onclick="fillExample()">填入示例</button>
          </div>
        </div>
      </section>

      <section id="view-debug" class="view">
        <div class="panel">
          <h2>最近请求结果</h2>
          <pre id="result" class="result">Ready.</pre>
        </div>
      </section>
    </main>
  </div>

  <script>
    let experiments = [];
    let selectedExperimentID = null;
    const tokenInput = document.getElementById('token');
    tokenInput.value = localStorage.getItem('abtest_admin_token') || '';
    document.getElementById('start_time').value = toDateTimeLocalUTC8(new Date());

    function showView(name) {
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-button').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + name).classList.add('active');
      const nav = document.querySelector('[data-view="' + name + '"]');
      if (nav) nav.classList.add('active');
    }

    function saveToken() {
      localStorage.setItem('abtest_admin_token', tokenInput.value);
      showResult('Token saved.');
      loadExperiments();
    }

    function headers() {
      const h = {'Content-Type': 'application/json'};
      const token = tokenInput.value.trim();
      if (token) h['X-Admin-Token'] = token;
      return h;
    }

    function parseJSON(id, fallback) {
      const raw = document.getElementById(id).value.trim();
      if (!raw) return fallback;
      return JSON.parse(raw);
    }

    function showResult(value) {
      document.getElementById('result').textContent = typeof value === 'string' ? value : JSON.stringify(value, null, 2);
    }

    async function api(path, options = {}) {
      const res = await fetch(path, Object.assign({}, options, {headers: Object.assign({}, headers(), options.headers || {})}));
      const text = await res.text();
      let body;
      try { body = text ? JSON.parse(text) : {}; } catch (_) { body = text; }
      if (!res.ok) throw body;
      return body;
    }

    async function loadExperiments() {
      try {
        experiments = await api('/abtest/admin/api/experiments');
        renderStats();
        renderExperiments();
        if (selectedExperimentID) selectExperiment(selectedExperimentID, false);
        showResult(experiments);
      } catch (err) {
        showResult(err);
        document.getElementById('experiments').innerHTML = '<div class="empty">加载失败，请检查 Token 或服务状态。</div>';
      }
    }

    function renderStats() {
      const running = experiments.filter(exp => exp.status === 'running').length;
      const draft = experiments.filter(exp => exp.status === 'draft').length;
      const inactive = experiments.filter(exp => exp.status === 'paused' || exp.status === 'stopped').length;
      document.getElementById('stat-total').textContent = experiments.length;
      document.getElementById('stat-running').textContent = running;
      document.getElementById('stat-draft').textContent = draft;
      document.getElementById('stat-inactive').textContent = inactive;
    }

    function renderExperiments() {
      const keyword = document.getElementById('search').value.trim().toLowerCase();
      const filtered = experiments.filter(exp => {
        const text = [exp.experiment_key, exp.name, exp.experiment_type, exp.status].join(' ').toLowerCase();
        return !keyword || text.includes(keyword);
      });
      if (!filtered.length) {
        document.getElementById('experiments').innerHTML = '<div class="empty">暂无匹配实验</div>';
        return;
      }
      document.getElementById('experiments').innerHTML = '<div class="table-wrap"><table><thead><tr>' +
        '<th>ID</th><th>实验</th><th>类型</th><th>状态</th><th>开始时间 UTC+8</th><th>已开展</th><th>持续时间</th><th>分组</th><th>进度</th>' +
        '</tr></thead><tbody>' + filtered.map(exp => experimentRow(exp)).join('') + '</tbody></table></div>';
    }

    function experimentRow(exp) {
      const selected = exp.id === selectedExperimentID ? 'selected' : '';
      const status = escapeHTML(exp.status || 'draft');
      const progress = experimentProgress(exp);
      const groups = (exp.groups || []).map((g, index) => escapeHTML(g.group_key) + ' ' + formatGroupRatio(exp.groups || [], index)).join('<br>') || '暂无分组';
      return '<tr class="' + selected + '" onclick="openExperiment(' + exp.id + ')">' +
        '<td>' + exp.id + '</td>' +
        '<td class="key-cell"><strong>' + escapeHTML(exp.name || exp.experiment_key) + '</strong><span>' + escapeHTML(exp.experiment_key) + '</span></td>' +
        '<td>' + escapeHTML(exp.experiment_type || '-') + '</td>' +
        '<td><span class="badge ' + status + '">' + status + '</span></td>' +
        '<td>' + escapeHTML(formatUTC8(exp.start_time)) + '</td>' +
        '<td>' + escapeHTML(formatRuntime(exp)) + '</td>' +
        '<td>' + escapeHTML(formatDuration(exp.duration_seconds || 0)) + '</td>' +
        '<td>' + groups + '</td>' +
        '<td><div class="progress"><i style="width:' + progress + '%"></i></div><span class="meta">' + progress + '%</span></td>' +
      '</tr>';
    }

    function openExperiment(id) {
      selectExperiment(id, true);
    }

    function selectExperiment(id, navigate) {
      selectedExperimentID = Number(id);
      const exp = experiments.find(item => item.id === selectedExperimentID);
      renderExperiments();
      if (!exp) return;
      document.getElementById('detail').innerHTML = detailHTML(exp);
      if (navigate) showView('detail');
    }

    function detailHTML(exp) {
      const groups = (exp.groups || []).map((group, index) => groupPanelHTML(exp, group, index)).join('') || '<div class="empty">暂无分组</div>';

      return '<div class="detail-title">' +
          '<div><h2>' + escapeHTML(exp.name || exp.experiment_key) + '</h2><div class="meta">' + escapeHTML(exp.experiment_key) + '</div></div>' +
          '<span class="badge ' + escapeHTML(exp.status) + '">' + escapeHTML(exp.status) + '</span>' +
        '</div>' +
        '<div class="kv">' +
          '<div><span>实验 ID</span><strong>' + exp.id + '</strong></div>' +
          '<div><span>类型</span><strong>' + escapeHTML(exp.experiment_type) + '</strong></div>' +
          '<div><span>已开展</span><strong>' + formatRuntime(exp) + '</strong></div>' +
          '<div><span>剩余/进度</span><strong>' + formatRemaining(exp) + ' · ' + experimentProgress(exp) + '%</strong></div>' +
          '<div><span>开始时间 UTC+8</span><strong>' + escapeHTML(formatUTC8(exp.start_time)) + '</strong></div>' +
          '<div><span>结束时间 UTC+8</span><strong>' + escapeHTML(formatUTC8(exp.end_time)) + '</strong></div>' +
          '<div><span>持续时间</span><strong>' + formatDuration(exp.duration_seconds || 0) + '</strong></div>' +
          '<div><span>版本</span><strong>v' + escapeHTML(String(exp.version || 1)) + '</strong></div>' +
        '</div>' +
        '<div class="actions">' +
          '<button class="soft" onclick="showView(\'dashboard\')">返回列表</button>' +
          '<button onclick="setStatus(' + exp.id + ', \'start\')">启动</button>' +
          '<button class="secondary" onclick="setStatus(' + exp.id + ', \'pause\')">暂停</button>' +
          '<button class="danger" onclick="setStatus(' + exp.id + ', \'stop\')">停止</button>' +
          '<button class="danger" onclick="withdrawExperiment(' + exp.id + ')">撤回</button>' +
        '</div>' +
        '<div class="detail-section"><h3>到期续期</h3><div class="inline-duration"><input id="renew_duration_value_' + exp.id + '" type="number" min="1" value="7"><select id="renew_duration_unit_' + exp.id + '">' + durationOptions('day') + '</select></div><div class="actions"><button onclick="renewExperiment(' + exp.id + ')">续期实验</button></div></div>' +
        '<div class="detail-section"><h3>修改基础参数</h3>' + editExperimentForm(exp) + '</div>' +
        '<div class="detail-section"><h3>Targeting</h3><pre class="config-preview">' + escapeHTML(JSON.stringify(exp.targeting || {}, null, 2)) + '</pre></div>' +
        '<div class="detail-section"><h3>分组与指定设备</h3><p class="meta">每个分组都可以直接改名称、占比和配置；在分组下输入设备 ID，会创建 force_group 例外并把设备固定到该组。</p><div class="group-list">' + groups + '</div>' + addGroupForm(exp) + '</div>';
    }

    function groupPanelHTML(exp, group, index) {
      const assigned = (exp.overrides || []).filter(item =>
        item.subject_type === 'device' && item.action === 'force_group' && item.group_key === group.group_key
      );
      const chips = assigned.map(item => '<span class="assignment-chip">' +
        escapeHTML(item.subject_id) +
        '<button title="移除设备例外" onclick="deleteOverride(' + exp.id + ', ' + item.id + ')">x</button>' +
      '</span>').join('') || '<span class="meta">暂无指定设备</span>';

      return '<div class="group-panel">' +
        '<header><h4>' + escapeHTML(group.group_key) + '</h4><span class="badge">' + formatGroupRatio(exp.groups || [], index) + '</span></header>' +
        '<div class="group-editor">' +
          '<div><label>分组名称</label><input id="group_key_edit_' + group.id + '" value="' + escapeAttr(group.group_key || '') + '"></div>' +
          '<div><label>万分比</label><input id="group_traffic_edit_' + group.id + '" type="number" min="0" max="10000" value="' + Number(group.traffic_basis_points || 0) + '"></div>' +
        '</div>' +
        '<label>分组 Config JSON</label><textarea id="group_config_edit_' + group.id + '">' + escapeHTML(JSON.stringify(group.config || {}, null, 2)) + '</textarea>' +
        '<div class="actions"><button onclick="updateGroup(' + exp.id + ', ' + group.id + ')">保存分组</button><button class="secondary" onclick="pushFullGroup(' + exp.id + ', ' + group.id + ')">推全到该组</button><button class="danger" onclick="deleteGroup(' + exp.id + ', ' + group.id + ')">删除分组</button></div>' +
        '<label>固定到该组的设备</label><div class="assignment-list">' + chips + '</div>' +
        '<div class="inline-add"><input id="assign_device_' + group.id + '" placeholder="输入 device_id 后加入 ' + escapeAttr(group.group_key) + '"><button onclick="assignDeviceToGroup(' + exp.id + ', ' + group.id + ')">加入该组</button></div>' +
      '</div>';
    }

    function editExperimentForm(exp) {
      const duration = splitDuration(exp.duration_seconds || 0);
      return '<div class="form-grid">' +
        '<div><label>实验名称</label><input id="edit_name" value="' + escapeAttr(exp.name || '') + '"></div>' +
        '<div><label>实验类型</label><select id="edit_experiment_type">' + optionHTML('client', exp.experiment_type) + optionHTML('server', exp.experiment_type) + optionHTML('all', exp.experiment_type) + '</select></div>' +
        '<div><label>状态</label><select id="edit_status">' + optionHTML('draft', exp.status) + optionHTML('running', exp.status) + optionHTML('paused', exp.status) + optionHTML('stopped', exp.status) + '</select></div>' +
        '<div><label>开始时间（UTC+8）</label><input id="edit_start_time" type="datetime-local" value="' + escapeAttr(toDateTimeLocalUTC8(exp.start_time)) + '"></div>' +
        '<div><label>持续时间</label><div class="inline-duration"><input id="edit_duration_value" type="number" min="1" value="' + duration.value + '"><select id="edit_duration_unit">' + durationOptions(duration.unit) + '</select></div></div>' +
        '<div><label>说明</label><input id="edit_description" value="' + escapeAttr(exp.description || '') + '"></div>' +
        '</div>' +
        '<label>Targeting JSON</label><textarea id="edit_targeting">' + escapeHTML(JSON.stringify(exp.targeting || {}, null, 2)) + '</textarea>' +
        '<div class="actions"><button onclick="updateExperiment(' + exp.id + ')">保存修改</button></div>';
    }

    function addGroupForm(exp) {
      const remaining = remainingTraffic(exp);
      return '<div class="detail-section"><h3>添加分组</h3><div class="form-grid">' +
        '<div><label>分组 Key</label><input id="group_key_' + exp.id + '" placeholder="variant"></div>' +
        '<div><label>分流万分比</label><input id="traffic_basis_points_' + exp.id + '" type="number" min="0" max="' + remaining + '" value="' + remaining + '"></div>' +
        '</div><label>分组 Config JSON</label><textarea id="group_config_' + exp.id + '">{"flag":true}</textarea>' +
        '<p class="meta">当前已使用 ' + formatRatio(usedTraffic(exp)) + '，剩余 ' + formatRatio(remaining) + '。服务端会拒绝总和超过 100%。</p>' +
        '<div class="actions"><button onclick="addGroup(' + exp.id + ')">添加分组</button></div></div>';
    }

    function addOverrideForm(exp) {
      return '<div class="detail-section"><h3>添加例外设备 / 主体</h3><div class="form-grid">' +
        '<div><label>主体类型</label><input id="subject_type_' + exp.id + '" value="device"></div>' +
        '<div><label>主体 ID</label><input id="subject_id_' + exp.id + '" placeholder="device-001"></div>' +
        '<div><label>例外动作</label><select id="override_action_' + exp.id + '"><option value="force_group">force_group</option><option value="exclude">exclude</option><option value="merge_config">merge_config</option></select></div>' +
        '<div><label>强制分组</label><input id="override_group_key_' + exp.id + '" placeholder="variant"></div>' +
        '</div><label>例外 Config JSON</label><textarea id="override_config_' + exp.id + '">{}</textarea>' +
        '<div class="actions"><button onclick="addOverride(' + exp.id + ')">添加例外</button></div></div>';
    }

    async function createExperiment() {
      try {
        const body = {
          experiment_key: document.getElementById('experiment_key').value,
          name: document.getElementById('name').value,
          description: document.getElementById('description').value,
          experiment_type: document.getElementById('experiment_type').value,
          status: document.getElementById('status').value,
          start_time: fromDateTimeLocalUTC8(document.getElementById('start_time').value),
          duration_seconds: durationSeconds('duration_value', 'duration_unit'),
          targeting: parseJSON('targeting', {}),
          groups: parseJSON('groups', [])
        };
        const created = await api('/abtest/admin/api/experiments', {method: 'POST', body: JSON.stringify(body)});
        showResult(created);
        selectedExperimentID = created.id;
        await loadExperiments();
        showView('detail');
      } catch (err) {
        showResult(err);
      }
    }

    async function updateExperiment(id) {
      try {
        const body = {
          name: document.getElementById('edit_name').value,
          description: document.getElementById('edit_description').value,
          experiment_type: document.getElementById('edit_experiment_type').value,
          status: document.getElementById('edit_status').value,
          start_time: fromDateTimeLocalUTC8(document.getElementById('edit_start_time').value),
          duration_seconds: durationSeconds('edit_duration_value', 'edit_duration_unit'),
          targeting: JSON.parse(document.getElementById('edit_targeting').value || '{}')
        };
        const updated = await api('/abtest/admin/api/experiments/' + id, {method: 'PUT', body: JSON.stringify(body)});
        showResult(updated);
        selectedExperimentID = updated.id;
        await loadExperiments();
      } catch (err) {
        showResult(err);
      }
    }

    async function setStatus(id, action) {
      try {
        const result = await api('/abtest/admin/api/experiments/' + id + '/' + action, {method: 'POST'});
        showResult(result);
        selectedExperimentID = result.id;
        await loadExperiments();
      } catch (err) {
        showResult(err);
      }
    }

    async function renewExperiment(id) {
      try {
        const body = {
          duration_seconds: durationSeconds('renew_duration_value_' + id, 'renew_duration_unit_' + id)
        };
        const result = await api('/abtest/admin/api/experiments/' + id + '/renew', {method: 'POST', body: JSON.stringify(body)});
        showResult(result);
        selectedExperimentID = result.id;
        await loadExperiments();
      } catch (err) {
        showResult(err);
      }
    }

    async function withdrawExperiment(id) {
      if (!confirm('确认撤回这个实验吗？撤回后客户端下一次拉配置将不会再收到它。')) return;
      try {
        const result = await api('/abtest/admin/api/experiments/' + id + '/withdraw', {method: 'POST'});
        showResult(result);
        selectedExperimentID = result.id;
        await loadExperiments();
      } catch (err) {
        showResult(err);
      }
    }

    async function addGroup(id) {
      try {
        const body = {
          group_key: document.getElementById('group_key_' + id).value,
          traffic_basis_points: Number(document.getElementById('traffic_basis_points_' + id).value),
          config: JSON.parse(document.getElementById('group_config_' + id).value || '{}')
        };
        const result = await api('/abtest/admin/api/experiments/' + id + '/groups', {method: 'POST', body: JSON.stringify(body)});
        showResult(result);
        selectedExperimentID = Number(id);
        await loadExperiments();
      } catch (err) {
        showResult(err);
      }
    }

    async function updateGroup(experimentID, groupID) {
      try {
        const body = {
          group_key: document.getElementById('group_key_edit_' + groupID).value,
          traffic_basis_points: Number(document.getElementById('group_traffic_edit_' + groupID).value),
          config: JSON.parse(document.getElementById('group_config_edit_' + groupID).value || '{}')
        };
        const result = await api('/abtest/admin/api/experiments/' + experimentID + '/groups/' + groupID, {method: 'PUT', body: JSON.stringify(body)});
        showResult(result);
        selectedExperimentID = Number(experimentID);
        await loadExperiments();

        showResult(err);
      }
    }

    async function pushFullGroup(experimentID, groupID) {
      if (!confirm('确认把该分组推全到 100% 吗？其它分组会被置为 0%。')) return;
      try {
        const result = await api('/abtest/admin/api/experiments/' + experimentID + '/groups/' + groupID + '/push_full', {method: 'POST'});
        showResult(result);
        selectedExperimentID = Number(experimentID);
        await loadExperiments();
      } catch (err) {
        showResult(err);
      }
    }

    async function deleteGroup(experimentID, groupID) {
      if (!confirm('确认删除这个分组吗？固定到该组的设备例外也会一起删除。')) return;
      try {
        const result = await api('/abtest/admin/api/experiments/' + experimentID + '/groups/' + groupID, {method: 'DELETE'});
        showResult(result);
        selectedExperimentID = Number(experimentID);
        await loadExperiments();
      } catch (err) {
        showResult(err);
      }
    }

    async function assignDeviceToGroup(experimentID, groupID) {
      const deviceID = document.getElementById('assign_device_' + groupID).value.trim();
      const groupKey = document.getElementById('group_key_edit_' + groupID).value.trim();
      if (!deviceID || !groupKey) {
        showResult({error: 'device_id and group_key are required'});
        return;
      }
      try {
        const exp = experiments.find(item => item.id === Number(experimentID));
        const existing = ((exp && exp.overrides) || []).find(item =>
          item.subject_type === 'device' && item.subject_id === deviceID && item.action === 'force_group'
        );
        const body = {
          subject_type: 'device',
          subject_id: deviceID,
          action: 'force_group',
          group_key: groupKey,
          config: existing && existing.config ? existing.config : {}
        };
        const path = existing
          ? '/abtest/admin/api/experiments/' + experimentID + '/overrides/' + existing.id
          : '/abtest/admin/api/experiments/' + experimentID + '/overrides';
        const result = await api(path, {method: existing ? 'PUT' : 'POST', body: JSON.stringify(body)});
        showResult(result);
        selectedExperimentID = Number(experimentID);
        await loadExperiments();
      } catch (err) {
        showResult(err);
      }
    }

    async function addOverride(id) {
      try {
        const body = {
          subject_type: document.getElementById('subject_type_' + id).value,
          subject_id: document.getElementById('subject_id_' + id).value,
          action: document.getElementById('override_action_' + id).value,
          group_key: document.getElementById('override_group_key_' + id).value,
          config: JSON.parse(document.getElementById('override_config_' + id).value || '{}')
        };
        const result = await api('/abtest/admin/api/experiments/' + id + '/overrides', {method: 'POST', body: JSON.stringify(body)});
        showResult(result);

    async function updateOverride(experimentID, overrideID) {
      try {
        const body = {
          subject_type: document.getElementById('override_subject_type_' + overrideID).value,
          subject_id: document.getElementById('override_subject_id_' + overrideID).value,
          action: document.getElementById('override_action_edit_' + overrideID).value,
          group_key: document.getElementById('override_group_edit_' + overrideID).value,
          config: JSON.parse(document.getElementById('override_config_edit_' + overrideID).value || '{}')
        };
        const result = await api('/abtest/admin/api/experiments/' + experimentID + '/overrides/' + overrideID, {method: 'PUT', body: JSON.stringify(body)});
        showResult(result);

      } catch (err) {

    async function deleteOverride(experimentID, overrideID) {
      if (!confirm('确认删除这个例外规则吗？')) return;
      try {
        const result = await api('/abtest/admin/api/experiments/' + experimentID + '/overrides/' + overrideID, {method: 'DELETE'});
        showResult(result);
        selectedExperimentID = Number(experimentID);
        await loadExperiments();
      } catch (err) {
        showResult(err);
      }

    function fillExample() {
      document.getElementById('experiment_key').value = 'new_chat_ui';
      document.getElementById('name').value = '新聊天页实验';
      document.getElementById('description').value = '控制客户端聊天页 UI 开关，先针对 iOS 新版本灰度。';
      document.getElementById('duration_value').value = '7';
      document.getElementById('duration_unit').value = 'day';
      document.getElementById('start_time').value = toDateTimeLocalUTC8(new Date());
      document.getElementById('targeting').value = '{"platforms":["ios"],"min_app_version":"1.0.0","min_system_version":"17.0"}';
      document.getElementById('groups').value = '[\n  {"group_key":"control","traffic_basis_points":5000,"config":{"enable_new_chat_ui":false}},\n  {"group_key":"variant","traffic_basis_points":5000,"config":{"enable_new_chat_ui":true}}\n]';
    }

    function experimentProgress(exp) {
      const start = Date.parse(exp.start_time || '');
      const end = Date.parse(exp.end_time || '');
      if (!start || !end || end <= start) return 0;
      const pct = Math.round((Date.now() - start) / (end - start) * 100);
      return Math.max(0, Math.min(100, pct));
    }

    function formatRuntime(exp) {
      const start = Date.parse(exp.start_time || '');
      if (!start || Date.now() < start) return '尚未开始';
      return formatDuration(Math.floor((Date.now() - start) / 1000));
    }

    function formatRemaining(exp) {
      const end = Date.parse(exp.end_time || '');
      if (!end) return '-';
      const seconds = Math.floor((end - Date.now()) / 1000);
      if (seconds <= 0) return '已结束';
      return '剩余 ' + formatDuration(seconds);
    }

    function formatDuration(seconds) {
      seconds = Math.max(0, Number(seconds || 0));
      const days = Math.floor(seconds / 86400);
      const hours = Math.floor((seconds % 86400) / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      if (days > 0) return days + '天 ' + hours + '小时';
      if (hours > 0) return hours + '小时 ' + minutes + '分钟';
      if (minutes > 0) return minutes + '分钟';
      return seconds + '秒';
    }

    function formatRatio(bp) {
      return (Number(bp || 0) / 100).toFixed(2) + '%';
    }

    function usedTraffic(exp) {
      return (exp.groups || []).reduce((sum, group) => sum + Number(group.traffic_basis_points || 0), 0);
    }

    function remainingTraffic(exp) {
      return Math.max(0, 10000 - usedTraffic(exp));
    }

    function formatGroupRatio(groups, index) {
      const allZero = groups.length > 0 && groups.every(group => Number(group.traffic_basis_points || 0) === 0);
      if (allZero) return index === 0 ? '默认100%' : '0.00%';
      return formatRatio(groups[index] && groups[index].traffic_basis_points);
    }

    function durationSeconds(valueID, unitID) {
      const value = Number(document.getElementById(valueID).value || 0);
      const unit = document.getElementById(unitID).value;
      const factor = {second: 1, minute: 60, hour: 3600, day: 86400}[unit] || 1;
      return Math.max(0, Math.floor(value * factor));
    }

    function splitDuration(seconds) {
      seconds = Number(seconds || 0);
      if (seconds >= 86400 && seconds % 86400 === 0) return {value: seconds / 86400, unit: 'day'};
      if (seconds >= 3600 && seconds % 3600 === 0) return {value: seconds / 3600, unit: 'hour'};
      if (seconds >= 60 && seconds % 60 === 0) return {value: seconds / 60, unit: 'minute'};
      return {value: Math.max(1, seconds), unit: 'second'};
    }

    function durationOptions(selected) {
      return ['second', 'minute', 'hour', 'day'].map(unit => '<option value="' + unit + '"' + (unit === selected ? ' selected' : '') + '>' + durationUnitLabel(unit) + '</option>').join('');
    }

    function durationUnitLabel(unit) {
      return {second: '秒', minute: '分钟', hour: '小时', day: '天'}[unit] || unit;
    }

    function optionHTML(value, selected) {
      return '<option value="' + value + '"' + (value === selected ? ' selected' : '') + '>' + value + '</option>';
    }

    function overrideActionOptions(selected) {
      return ['force_group', 'exclude', 'merge_config'].map(action => optionHTML(action, selected)).join('');
    }

    function fromDateTimeLocalUTC8(value) {
      if (!value) return '';
      return value.length === 16 ? value + ':00+08:00' : value + '+08:00';
    }

    function toDateTimeLocalUTC8(value) {
      const date = value instanceof Date ? value : new Date(value || Date.now());
      if (Number.isNaN(date.getTime())) return '';
      const utc8 = new Date(date.getTime() + 8 * 3600 * 1000);
      return utc8.toISOString().slice(0, 16);
    }

    function formatUTC8(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      const utc8 = new Date(date.getTime() + 8 * 3600 * 1000);
      return utc8.toISOString().replace('T', ' ').slice(0, 19) + ' UTC+8';
    }

    function escapeHTML(value) {
      return String(value == null ? '' : value).replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[ch]));
    }

    function escapeAttr(value) {
      return escapeHTML(value).replace(/`/g, '&#96;');
    }

    loadExperiments();
    setInterval(function() {
      if (experiments.length) {
        renderExperiments();
        if (selectedExperimentID) selectExperiment(selectedExperimentID, false);
      }
    }, 60000);
  </script>
