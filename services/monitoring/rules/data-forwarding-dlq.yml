groups:
  - name: data-forwarding-dlq
    rules:
      - alert: BetterflyDataForwardingDLQMessages
        expr: increase(betterfly_kafka_dlq_messages_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: DataForwarding messages entered the DLQ
      - alert: BetterflyDataForwardingDLQPublishFailure
        expr: increase(betterfly_kafka_dlq_publish_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: DataForwarding cannot publish to its DLQ and may block a partition
      - alert: BetterflyServiceDLQMessages
        expr: increase(betterfly_kafka_consumer_dlq_messages_total{service=~"storage|friend|call|push"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} messages entered its service DLQ"
      - alert: BetterflyServiceDLQPublishFailure
        expr: increase(betterfly_kafka_consumer_dlq_publish_failures_total{service=~"storage|friend|call|push"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.service }} cannot publish to its DLQ; its partition is blocked"
      - alert: BetterflyPushRetrySpike
        expr: increase(betterfly_push_deliveries_total{outcome="retryable"}[5m]) > 20
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: APNs retryable failures are elevated
