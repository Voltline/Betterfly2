x-database-env: &database-env
  PGSQL_DSN: ${PGSQL_DSN}
  DB_AUTO_MIGRATE: "false"
  DB_SCHEMA_CHECK: "true"
  DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-8}
  DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-2}
  DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-1h}
  DB_CONN_MAX_IDLE_TIME: ${DB_CONN_MAX_IDLE_TIME:-10m}
  CONSUMER_STATE_RETENTION: ${CONSUMER_STATE_RETENTION:-720h}
  KAFKA_MAX_REPLAY_WINDOW: ${KAFKA_MAX_REPLAY_WINDOW:-168h}
  RELIABILITY_CLEANUP_INTERVAL: ${RELIABILITY_CLEANUP_INTERVAL:-1h}
  RELIABILITY_CLEANUP_BATCH_SIZE: ${RELIABILITY_CLEANUP_BATCH_SIZE:-1000}
  OUTBOX_ALERT_AFTER_ATTEMPTS: ${OUTBOX_ALERT_AFTER_ATTEMPTS:-20}

services:
  db_migrate:
    build:
      context: ..
      dockerfile: shared/Dockerfile.migrate
    container_name: betterfly-db-migrate
    environment:
      PGSQL_DSN: ${PGSQL_DSN}
      DB_MAX_OPEN_CONNS: ${DB_MIGRATE_MAX_OPEN_CONNS:-4}
      DB_MAX_IDLE_CONNS: ${DB_MIGRATE_MAX_IDLE_CONNS:-1}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-1h}
      DB_CONN_MAX_IDLE_TIME: ${DB_CONN_MAX_IDLE_TIME:-10m}
    restart: "no"
    networks:
      - backend

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly no --save ""
    networks:
      - backend

  kafka1:
    image: apache/kafka:latest
    container_name: kafka1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka1:9092,CONTROLLER://kafka1:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9095
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9092:9092"
    networks:
      - backend

  kafka2:
    image: apache/kafka:latest
    container_name: kafka2
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka2:9094,CONTROLLER://kafka2:9095
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9095
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9094:9094"
    networks:
      - backend
    depends_on:
      - kafka1

  kafka-init:
    image: apache/kafka:latest
    container_name: kafka-init
    depends_on:
      - kafka1
      - kafka2
    environment:
      DF_DLQ_TOPIC: ${DF_KAFKA_DLQ_TOPIC:-data-forwarding-dlq}
      STORAGE_DLQ_TOPIC: ${STORAGE_KAFKA_DLQ_TOPIC:-storage-service-dlq}
      FRIEND_DLQ_TOPIC: ${FRIEND_KAFKA_DLQ_TOPIC:-friend-service-dlq}
      CALL_DLQ_TOPIC: ${CALL_KAFKA_DLQ_TOPIC:-call-service-dlq}
      PUSH_DLQ_TOPIC: ${PUSH_KAFKA_DLQ_TOPIC:-push-service-dlq}
      DLQ_PARTITIONS: ${DF_KAFKA_DLQ_PARTITIONS:-3}
      DLQ_REPLICATION_FACTOR: ${DF_KAFKA_DLQ_REPLICATION_FACTOR:-2}
      DLQ_MIN_ISR: ${DF_KAFKA_DLQ_MIN_ISR:-1}
      DF_DLQ_RETENTION_MS: ${DF_KAFKA_DLQ_RETENTION_MS:-604800000}
      STORAGE_DLQ_RETENTION_MS: ${STORAGE_KAFKA_DLQ_RETENTION_MS:-604800000}
      FRIEND_DLQ_RETENTION_MS: ${FRIEND_KAFKA_DLQ_RETENTION_MS:-604800000}
      CALL_DLQ_RETENTION_MS: ${CALL_KAFKA_DLQ_RETENTION_MS:-604800000}
      PUSH_DLQ_RETENTION_MS: ${PUSH_KAFKA_DLQ_RETENTION_MS:-604800000}
      KAFKA_ACL_ENABLED: ${KAFKA_ACL_ENABLED:-false}
    command:
      - /bin/bash
      - -ec
      - |
        until /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka1:9092,kafka2:9094 --list >/dev/null 2>&1; do
          echo "waiting for Kafka quorum"
          sleep 2
        done
        create_dlq() {
          topic="$$1"
          retention="$$2"
          principal="$$3"
          /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server kafka1:9092,kafka2:9094 \
            --create --if-not-exists \
            --topic "$${topic}" \
            --partitions "$${DLQ_PARTITIONS}" \
            --replication-factor "$${DLQ_REPLICATION_FACTOR}"
          /opt/kafka/bin/kafka-configs.sh \
            --bootstrap-server kafka1:9092,kafka2:9094 \
            --alter --entity-type topics --entity-name "$${topic}" \
            --add-config "cleanup.policy=delete,retention.ms=$${retention},min.insync.replicas=$${DLQ_MIN_ISR}"
          if [ "$${KAFKA_ACL_ENABLED}" = "true" ]; then
            /opt/kafka/bin/kafka-acls.sh \
              --bootstrap-server kafka1:9092,kafka2:9094 \
              --add --allow-principal "User:$${principal}" \
              --operation WRITE --operation DESCRIBE --topic "$${topic}"
          fi
        }
        create_dlq "$${DF_DLQ_TOPIC}" "$${DF_DLQ_RETENTION_MS}" data-forwarding
        create_dlq "$${STORAGE_DLQ_TOPIC}" "$${STORAGE_DLQ_RETENTION_MS}" storage-service
        create_dlq "$${FRIEND_DLQ_TOPIC}" "$${FRIEND_DLQ_RETENTION_MS}" friend-service
        create_dlq "$${CALL_DLQ_TOPIC}" "$${CALL_DLQ_RETENTION_MS}" call-service
        create_dlq "$${PUSH_DLQ_TOPIC}" "$${PUSH_DLQ_RETENTION_MS}" push-service
    restart: "no"
    networks:
      - backend

  kafka-ui:
    profiles: ["tools"]
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "TRUE"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:9092,kafka2:9094
    depends_on:
      - kafka1
      - kafka2
    networks:
      - backend

  df:
    build:
      context: ..
      dockerfile: services/dataForwardingService/Dockerfile
    container_name: df
    depends_on:
      db_migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *database-env
      DB_MAX_OPEN_CONNS: ${DF_DB_MAX_OPEN_CONNS:-12}
      DB_MAX_IDLE_CONNS: ${DF_DB_MAX_IDLE_CONNS:-4}
      PORT: 54342
      REDIS_ADDR: redis:6379
      KAFKA_BROKER: kafka1:9092,kafka2:9094
      AUTH_RPC_ADDR: auth_service:50051
      DF_KAFKA_DLQ_TOPIC: ${DF_KAFKA_DLQ_TOPIC:-data-forwarding-dlq}
      DF_KAFKA_PROCESS_MAX_RETRIES: ${DF_KAFKA_PROCESS_MAX_RETRIES:-3}
      DF_KAFKA_RETRY_INITIAL_BACKOFF: ${DF_KAFKA_RETRY_INITIAL_BACKOFF:-100ms}
      DF_KAFKA_RETRY_MAX_BACKOFF: ${DF_KAFKA_RETRY_MAX_BACKOFF:-2s}
      WS_ALLOWED_ORIGINS: ${WS_ALLOWED_ORIGINS:-}
      WS_ALLOW_MISSING_ORIGIN: ${WS_ALLOW_MISSING_ORIGIN:-true}
      WS_MAX_MESSAGE_BYTES: ${WS_MAX_MESSAGE_BYTES:-4194304}
      WS_AUTH_TIMEOUT: ${WS_AUTH_TIMEOUT:-15s}
      WS_PONG_WAIT: ${WS_PONG_WAIT:-60s}
      WS_PING_INTERVAL: ${WS_PING_INTERVAL:-25s}
      WS_WRITE_TIMEOUT: ${WS_WRITE_TIMEOUT:-10s}
      WS_READ_HEADER_TIMEOUT: ${WS_READ_HEADER_TIMEOUT:-5s}
      WS_IDLE_TIMEOUT: ${WS_IDLE_TIMEOUT:-60s}
      WS_MAX_HEADER_BYTES: ${WS_MAX_HEADER_BYTES:-1048576}
      WS_SESSION_LEASE_TTL: ${WS_SESSION_LEASE_TTL:-2m}
      WS_ROUTE_LEASE_TTL: ${WS_ROUTE_LEASE_TTL:-90s}
      WS_LEASE_REFRESH_INTERVAL: ${WS_LEASE_REFRESH_INTERVAL:-30s}
      WS_LEASE_REFRESH_JITTER: ${WS_LEASE_REFRESH_JITTER:-5s}
      WS_REDIS_FAILURE_GRACE: ${WS_REDIS_FAILURE_GRACE:-3}
      KAFKA_NETWORK_TIMEOUT: ${KAFKA_NETWORK_TIMEOUT:-10s}
      MONITOR_USER_ID: ${MONITOR_USER_ID:-900000000000000001}
      MONITOR_NAME: ${MONITOR_NAME:-Betterfly Monitor}
      MONITOR_AVATAR: ${MONITOR_AVATAR:-}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - "54342:54342"
    networks:
      - backend

  df2:
    profiles: ["redundancy"]
    build:
      context: ..
      dockerfile: services/dataForwardingService/Dockerfile
    container_name: df2
    depends_on:
      db_migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *database-env
      DB_MAX_OPEN_CONNS: ${DF_DB_MAX_OPEN_CONNS:-12}
      DB_MAX_IDLE_CONNS: ${DF_DB_MAX_IDLE_CONNS:-4}
      PORT: 54343
      REDIS_ADDR: redis:6379
      KAFKA_BROKER: kafka1:9092,kafka2:9094
      AUTH_RPC_ADDR: auth_service:50051
      DF_KAFKA_DLQ_TOPIC: ${DF_KAFKA_DLQ_TOPIC:-data-forwarding-dlq}
      DF_KAFKA_PROCESS_MAX_RETRIES: ${DF_KAFKA_PROCESS_MAX_RETRIES:-3}
      DF_KAFKA_RETRY_INITIAL_BACKOFF: ${DF_KAFKA_RETRY_INITIAL_BACKOFF:-100ms}
      DF_KAFKA_RETRY_MAX_BACKOFF: ${DF_KAFKA_RETRY_MAX_BACKOFF:-2s}
      WS_ALLOWED_ORIGINS: ${WS_ALLOWED_ORIGINS:-}
      WS_ALLOW_MISSING_ORIGIN: ${WS_ALLOW_MISSING_ORIGIN:-true}
      WS_MAX_MESSAGE_BYTES: ${WS_MAX_MESSAGE_BYTES:-4194304}
      WS_AUTH_TIMEOUT: ${WS_AUTH_TIMEOUT:-15s}
      WS_PONG_WAIT: ${WS_PONG_WAIT:-60s}
      WS_PING_INTERVAL: ${WS_PING_INTERVAL:-25s}
      WS_WRITE_TIMEOUT: ${WS_WRITE_TIMEOUT:-10s}
      WS_READ_HEADER_TIMEOUT: ${WS_READ_HEADER_TIMEOUT:-5s}
      WS_IDLE_TIMEOUT: ${WS_IDLE_TIMEOUT:-60s}
      WS_MAX_HEADER_BYTES: ${WS_MAX_HEADER_BYTES:-1048576}
      WS_SESSION_LEASE_TTL: ${WS_SESSION_LEASE_TTL:-2m}
      WS_ROUTE_LEASE_TTL: ${WS_ROUTE_LEASE_TTL:-90s}
      WS_LEASE_REFRESH_INTERVAL: ${WS_LEASE_REFRESH_INTERVAL:-30s}
      WS_LEASE_REFRESH_JITTER: ${WS_LEASE_REFRESH_JITTER:-5s}
      WS_REDIS_FAILURE_GRACE: ${WS_REDIS_FAILURE_GRACE:-3}
      KAFKA_NETWORK_TIMEOUT: ${KAFKA_NETWORK_TIMEOUT:-10s}
      MONITOR_USER_ID: ${MONITOR_USER_ID:-900000000000000001}
      MONITOR_NAME: ${MONITOR_NAME:-Betterfly Monitor}
      MONITOR_AVATAR: ${MONITOR_AVATAR:-}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - "54343:54343"
    networks:
      - backend

  auth_service:
    build:
      context: ..
      dockerfile: services/authService/Dockerfile
    container_name: authService
    environment:
      <<: *database-env
      DB_MAX_OPEN_CONNS: ${AUTH_DB_MAX_OPEN_CONNS:-8}
      DB_MAX_IDLE_CONNS: ${AUTH_DB_MAX_IDLE_CONNS:-2}
      PORT: 50051
    depends_on:
      db_migrate:
        condition: service_completed_successfully
    ports:
      - "50051:50051"
    networks:
      - backend

  rustfs:
    profiles: ["storage"]
    image: rustfs/rustfs:latest
    container_name: rustfs
    ports:
      - "9000:9000"  # S3 API端口
      - "9001:9001"  # 控制台端口
    volumes:
      - rustfs-data:/data
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    command:
      - --address
      - :9000
      - --console-enable
      - --access-key
      - ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - --secret-key
      - ${RUSTFS_SECRET_KEY:-rustfsadmin}
      - /data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  storage_service:
    profiles: ["storage"]
    build:
      context: ..
      dockerfile: services/storageService/Dockerfile
    container_name: storageService
    depends_on:
      db_migrate:
        condition: service_completed_successfully
      rustfs:
        condition: service_started
      redis:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *database-env
      DB_MAX_OPEN_CONNS: ${STORAGE_DB_MAX_OPEN_CONNS:-12}
      DB_MAX_IDLE_CONNS: ${STORAGE_DB_MAX_IDLE_CONNS:-4}
      REDIS_ADDR: redis:6379
      KAFKA_BROKER: kafka1:9092,kafka2:9094
      KAFKA_STORAGE_TOPIC: storage-service
      KAFKA_CONSUMER_GROUP: storage-service-group
      STORAGE_KAFKA_DLQ_TOPIC: ${STORAGE_KAFKA_DLQ_TOPIC:-storage-service-dlq}
      STORAGE_KAFKA_PROCESS_MAX_RETRIES: ${STORAGE_KAFKA_PROCESS_MAX_RETRIES:-3}
      STORAGE_KAFKA_RETRY_INITIAL_BACKOFF: ${STORAGE_KAFKA_RETRY_INITIAL_BACKOFF:-100ms}
      STORAGE_KAFKA_RETRY_MAX_BACKOFF: ${STORAGE_KAFKA_RETRY_MAX_BACKOFF:-2s}
      KAFKA_NETWORK_TIMEOUT: ${KAFKA_NETWORK_TIMEOUT:-10s}
      AUTH_RPC_ADDR: auth_service:50051
      HTTP_PORT: ${HTTP_PORT:-8081}
      # RustFS配置
      RUSTFS_REGION: ${RUSTFS_REGION:-cn-east-1}
      RUSTFS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_ENDPOINT_URL: http://rustfs:9000
      RUSTFS_EXTERNAL_ENDPOINT_URL: ${RUSTFS_EXTERNAL_ENDPOINT_URL:-}
      RUSTFS_EXTERNAL_PORT: ${RUSTFS_EXTERNAL_PORT:-9000}
      RUSTFS_BUCKET: ${RUSTFS_BUCKET:-betterfly-files}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - "${HTTP_PORT:-8081}:${HTTP_PORT:-8081}"
    networks:
      - backend

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/rules:/etc/prometheus/rules:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - backend
  grafana:
    profiles: ["observability"]
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - backend
    depends_on:
      - prometheus

  friend_service:
    build:
      context: ..
      dockerfile: services/friendService/Dockerfile
    container_name: friendService
    environment:
      <<: *database-env
      DB_MAX_OPEN_CONNS: ${FRIEND_DB_MAX_OPEN_CONNS:-10}
      DB_MAX_IDLE_CONNS: ${FRIEND_DB_MAX_IDLE_CONNS:-3}
      KAFKA_BROKER: kafka1:9092,kafka2:9094
      PORT: 54401
      FRIEND_KAFKA_DLQ_TOPIC: ${FRIEND_KAFKA_DLQ_TOPIC:-friend-service-dlq}
      FRIEND_KAFKA_PROCESS_MAX_RETRIES: ${FRIEND_KAFKA_PROCESS_MAX_RETRIES:-3}
      FRIEND_KAFKA_RETRY_INITIAL_BACKOFF: ${FRIEND_KAFKA_RETRY_INITIAL_BACKOFF:-100ms}
      FRIEND_KAFKA_RETRY_MAX_BACKOFF: ${FRIEND_KAFKA_RETRY_MAX_BACKOFF:-2s}
      KAFKA_NETWORK_TIMEOUT: ${KAFKA_NETWORK_TIMEOUT:-10s}
    depends_on:
      db_migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "54401:54401"
    networks:
      - backend

  abtest_service:
    profiles: ["experiments"]
    build:
      context: ..
      dockerfile: services/abTestService/Dockerfile
    container_name: abTestService
    environment:
      <<: *database-env
      DB_MAX_OPEN_CONNS: ${ABTEST_DB_MAX_OPEN_CONNS:-8}
      DB_MAX_IDLE_CONNS: ${ABTEST_DB_MAX_IDLE_CONNS:-2}
      PORT: ${ABTEST_HTTP_PORT:-8082}
      REDIS_ADDR: redis:6379
      ABTEST_CACHE_MAX_STALENESS: ${ABTEST_CACHE_MAX_STALENESS:-5s}
      ABTEST_OVERRIDE_CACHE_TTL: ${ABTEST_OVERRIDE_CACHE_TTL:-3s}
      ABTEST_OVERRIDE_CACHE_MAX_ENTRIES: ${ABTEST_OVERRIDE_CACHE_MAX_ENTRIES:-10000}
      ABTEST_ADMIN_TOKEN: ${ABTEST_ADMIN_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    depends_on:
      db_migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    ports:
      - "${ABTEST_HTTP_PORT:-8082}:${ABTEST_HTTP_PORT:-8082}"
    networks:
      - backend

  call_service:
    profiles: ["calls"]
    build:
      context: ..
      dockerfile: services/callService/Dockerfile
    container_name: callService
    environment:
      HTTP_PORT: ${CALL_HTTP_PORT:-8085}
      REDIS_ADDR: redis:6379
      KAFKA_BROKER: kafka1:9092,kafka2:9094
      KAFKA_CALL_TOPIC: call-service
      KAFKA_CONSUMER_GROUP: call-service-group
      CALL_KAFKA_DLQ_TOPIC: ${CALL_KAFKA_DLQ_TOPIC:-call-service-dlq}
      CALL_KAFKA_PROCESS_MAX_RETRIES: ${CALL_KAFKA_PROCESS_MAX_RETRIES:-3}
      CALL_KAFKA_RETRY_INITIAL_BACKOFF: ${CALL_KAFKA_RETRY_INITIAL_BACKOFF:-100ms}
      CALL_KAFKA_RETRY_MAX_BACKOFF: ${CALL_KAFKA_RETRY_MAX_BACKOFF:-2s}
      KAFKA_NETWORK_TIMEOUT: ${KAFKA_NETWORK_TIMEOUT:-10s}
      KAFKA_VOIP_PUSH_TOPIC: push-service-voip
      CALL_RING_TIMEOUT_SECONDS: ${CALL_RING_TIMEOUT_SECONDS:-45}
      CALL_ACTIVE_TTL_SECONDS: ${CALL_ACTIVE_TTL_SECONDS:-21600}
      CALL_OPERATION_RETENTION: ${CALL_OPERATION_RETENTION:-720h}
      CALL_OUTBOX_SENT_RETENTION: ${CALL_OUTBOX_SENT_RETENTION:-720h}
      KAFKA_MAX_REPLAY_WINDOW: ${KAFKA_MAX_REPLAY_WINDOW:-168h}
      TURN_PUBLIC_HOST: ${TURN_PUBLIC_HOST:-localhost}
      CALL_STUN_URLS: ${CALL_STUN_URLS:-}
      CALL_TURN_URLS: ${CALL_TURN_URLS:-}
      TURN_SHARED_SECRET: ${TURN_SHARED_SECRET:-betterfly-dev-turn-secret}
      TURN_CREDENTIAL_TTL_SECONDS: ${TURN_CREDENTIAL_TTL_SECONDS:-3600}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - "${CALL_HTTP_PORT:-8085}:${CALL_HTTP_PORT:-8085}"
    depends_on:
      - redis
      - kafka-init
      - push_service
    networks:
      - backend

  push_service:
    profiles: ["notifications", "calls"]
    build:
      context: ..
      dockerfile: services/pushService/Dockerfile
    container_name: pushService
    environment:
      <<: *database-env
      DB_MAX_OPEN_CONNS: ${PUSH_DB_MAX_OPEN_CONNS:-12}
      DB_MAX_IDLE_CONNS: ${PUSH_DB_MAX_IDLE_CONNS:-4}
      HTTP_PORT: ${PUSH_HTTP_PORT:-8086}
      KAFKA_BROKER: kafka1:9092,kafka2:9094
      KAFKA_PUSH_TOPIC: push-service
      KAFKA_CONSUMER_GROUP: push-service-group
      KAFKA_VOIP_PUSH_TOPIC: push-service-voip
      KAFKA_VOIP_CONSUMER_GROUP: push-service-voip-group
      PUSH_KAFKA_DLQ_TOPIC: ${PUSH_KAFKA_DLQ_TOPIC:-push-service-dlq}
      PUSH_KAFKA_PROCESS_MAX_RETRIES: ${PUSH_KAFKA_PROCESS_MAX_RETRIES:-3}
      PUSH_KAFKA_RETRY_INITIAL_BACKOFF: ${PUSH_KAFKA_RETRY_INITIAL_BACKOFF:-100ms}
      PUSH_KAFKA_RETRY_MAX_BACKOFF: ${PUSH_KAFKA_RETRY_MAX_BACKOFF:-2s}
      KAFKA_NETWORK_TIMEOUT: ${KAFKA_NETWORK_TIMEOUT:-10s}
      PUSH_APNS_MAX_CONCURRENCY: ${PUSH_APNS_MAX_CONCURRENCY:-16}
      PUSH_DELIVERY_LEASE: ${PUSH_DELIVERY_LEASE:-30s}
      PUSH_WORKER_BATCH_SIZE: ${PUSH_WORKER_BATCH_SIZE:-256}
      PUSH_WORKER_POLL_INTERVAL: ${PUSH_WORKER_POLL_INTERVAL:-250ms}
      PUSH_APNS_SEND_TIMEOUT: ${PUSH_APNS_SEND_TIMEOUT:-10s}
      PUSH_DELIVERY_MAX_ATTEMPTS: ${PUSH_DELIVERY_MAX_ATTEMPTS:-10}
      PUSH_DELIVERY_RETRY_INITIAL_BACKOFF: ${PUSH_DELIVERY_RETRY_INITIAL_BACKOFF:-1s}
      PUSH_DELIVERY_RETRY_MAX_BACKOFF: ${PUSH_DELIVERY_RETRY_MAX_BACKOFF:-15m}
      PUSH_DELIVERY_RETENTION: ${PUSH_DELIVERY_RETENTION:-720h}
      PUSH_CLEANUP_INTERVAL: ${PUSH_CLEANUP_INTERVAL:-1h}
      PUSH_CLEANUP_BATCH_SIZE: ${PUSH_CLEANUP_BATCH_SIZE:-1000}
      APNS_KEY_ID: ${APNS_KEY_ID:-C6D5695Q4Y}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-8R5Q4A3RC7}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-com.Voltline.Betterfly2}
      APNS_PRIVATE_KEY_BASE64: ${APNS_PRIVATE_KEY_BASE64:-}
      APNS_PRIVATE_KEY_PATH: /run/secrets/apns_key.p8
      PUSH_ADMIN_TOKEN: ${PUSH_ADMIN_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - "${PUSH_HTTP_PORT:-8086}:${PUSH_HTTP_PORT:-8086}"
    depends_on:
      db_migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - "${APNS_PRIVATE_KEY_HOST_PATH:-/dev/null}:/run/secrets/apns_key.p8:ro"
    networks:
      - backend

  coturn:
    profiles: ["calls"]
    image: coturn/coturn:latest
    container_name: coturn
    command:
      - --no-cli
      - --log-file=stdout
      - --fingerprint
      - --realm=${TURN_REALM:-betterfly.local}
      - --use-auth-secret
      - --static-auth-secret=${TURN_SHARED_SECRET:-betterfly-dev-turn-secret}
      - --external-ip=${TURN_EXTERNAL_IP:-127.0.0.1}
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  grafana-storage:
  rustfs-data:
