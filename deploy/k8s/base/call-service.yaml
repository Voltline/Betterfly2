apiVersion: apps/v1
kind: Deployment
metadata:
  name: call-service
  namespace: betterfly2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: call-service
  template:
    metadata:
      labels:
        app: call-service
    spec:
      containers:
        - name: call-service
          image: betterfly2/call-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: betterfly2-config
          env:
            - name: HTTP_PORT
              value: "8085"
            - name: KAFKA_CALL_TOPIC
              value: call-service
            - name: KAFKA_CONSUMER_GROUP
              value: call-service-group
            - name: KAFKA_VOIP_PUSH_TOPIC
              value: push-service-voip
            - name: TURN_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: betterfly2-secret
                  key: TURN_SHARED_SECRET
          ports:
            - name: health
              containerPort: 8085
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: health
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: call-service
  namespace: betterfly2
spec:
  selector:
    app: call-service
  ports:
    - name: health
      port: 8085
      targetPort: health
