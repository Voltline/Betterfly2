syntax = "proto3";
package storage_interface;
option go_package = "Betterfly2/proto/storage";

message StoreMsgRsp {
  int64 message_id = 1;
  string client_message_id = 2;
  bool created = 3;
  int64 from_user_id = 4;
  int64 to_user_id = 5;
  string content = 6;
  string message_type = 7;
  bool is_group = 8;
  string real_file_name = 9;
  string client_timestamp = 10;
}

message MessageRsp {
  int64 from_user_id = 1;
  int64 to_user_id = 2;
  string content = 3;
  string timestamp = 4;
  string msg_type = 5;
  bool is_group = 6;
  string real_file_name = 7;
  int64 message_id = 8;
  bool is_recalled = 9;
  string recalled_at = 10;
  int64 recalled_by = 11;
}

message RecallMessageRsp {
  int64 message_id = 1;
  int64 from_user_id = 2;
  int64 to_user_id = 3;
  bool is_group = 4;
  int64 operator_user_id = 5;
  string recalled_at = 6;
}

message SyncMessagesRsp {
  repeated MessageRsp msgs = 1;
  bool has_more = 2;
  string next_cursor_timestamp = 3;
  int64 next_cursor_message_id = 4;
}

message UserInfoRsp {
  int64 user_id = 1;
  string account = 2;
  string name = 3;
  string avatar = 4;
  string update_time = 5;
}

message FileExistsRsp {
  bool exists = 1;
  int64 file_size = 2;
  string storage_path = 3;
}
