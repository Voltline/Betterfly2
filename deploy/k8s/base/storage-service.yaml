apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-service
  namespace: betterfly2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage-service
  template:
    metadata:
      labels:
        app: storage-service
    spec:
      containers:
        - name: storage-service
          image: betterfly2/storage-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: betterfly2-config
          env:
            - name: PGSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: betterfly2-secret
                  key: PGSQL_DSN
            - name: RUSTFS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: betterfly2-secret
                  key: RUSTFS_ACCESS_KEY
            - name: RUSTFS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: betterfly2-secret
                  key: RUSTFS_SECRET_KEY
          ports:
            - name: http
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: storage-service
  namespace: betterfly2
spec:
  selector:
    app: storage-service
  ports:
    - name: http
      port: 8081
      targetPort: http
