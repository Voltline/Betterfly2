global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'data_forwarding'
    static_configs:
      - targets: ['df:9090', 'df2:9090']
        labels:
          service: 'data_forwarding'

  - job_name: 'storage'
    static_configs:
      - targets: ['storage_service:9091']
        labels:
          service: 'storage'

  - job_name: 'friend'
    static_configs:
      - targets: ['friend_service:54401']
        labels:
          service: 'friend'

  - job_name: 'call'
    static_configs:
      - targets: ['call_service:8085']
        labels:
          service: 'call'

  - job_name: 'push'
    static_configs:
      - targets: ['push_service:8086']
        labels:
          service: 'push'

  - job_name: 'abtest'
    static_configs:
      - targets: ['abtest_service:8082']
        labels:
          service: 'abtest'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
