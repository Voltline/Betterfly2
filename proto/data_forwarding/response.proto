syntax = "proto3";
package df_interface;
option go_package = "Betterfly2/proto/data_forwarding";

enum LoginResult {
  LOGIN_OK = 0;
  ACCOUNT_NOT_EXIST = 1;
  PASSWORD_ERROR = 2;
  JWT_ERROR = 3;
  LOGIN_SVR_ERROR = 10;
}

enum SignupResult {
  SIGNUP_OK = 0;
  ACCOUNT_EXIST = 1;
  ACCOUNT_EMPTY = 2;
  PASSWORD_EMPTY = 3;
  ACCOUNT_TOO_LONG = 4;
  SIGNUP_SVR_ERROR = 10;
}

message LoginRsp {
  LoginResult result = 1;
  int64 user_id = 2;
  string jwt = 3;
}

message SignupRsp {
  SignupResult result = 1;
}

message Refused { // 就是空的
}

message Server {
  string server_msg = 1;
}

message Warn {
  string warning_message = 1;
}

message PostAckRsp {
  int64 message_id = 1;
}

message UserInfo {
  int64 send_to_user_id = 1;
  string query_user_name = 2;
  int64 user_id = 3;
  string account = 4;
  string name = 5;
  string avatar = 6;
  string update_time = 7;
}

message ContactInfo {
  int64 user_id = 1;
  string account = 2;
  string name = 3;
  string avatar = 4;
  string alias = 5;
  bool is_notify = 6;
  string update_time = 7;
}

message ContactListRsp {
  repeated ContactInfo contacts = 1;
}

message GroupInfo {
  bool client_need_save = 1; // 对于原先的msg字段, 0保存，1不保存
  int64 query_group_id = 2;
  string query_group_name = 3;
  string avatar = 4;
}

message GroupMemberInfo {
  int64 user_id = 1;
  string account = 2;
  string name = 3;
  string avatar = 4;
  string role = 5;
  string update_time = 6;
}

message GroupMembersRsp {
  int64 group_id = 1;
  repeated GroupMemberInfo members = 2;
}

message JoinedGroupInfo {
  int64 group_id = 1;
  string group_name = 2;
  string avatar = 3;
  int64 owner_user_id = 4;
  string update_time = 5;
}

message JoinedGroupsRsp {
  repeated JoinedGroupInfo groups = 1;
}

// 单条消息响应
message MessageRsp {
  int64 from_user_id = 1;
  int64 to_user_id = 2;
  string content = 3;
  string timestamp = 4;
  string msg_type = 5;
  bool is_group = 6;
  string real_file_name = 7;
  int64 message_id = 8;
}

// 同步消息响应
message SyncMessagesRsp {
  repeated MessageRsp msgs = 1;
}
