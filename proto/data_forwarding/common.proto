syntax = "proto3";
package df_interface;
option go_package = "Betterfly2/proto/data_forwarding";

message Post {
  int64 from_id = 1;
  bool is_group = 2;
  int64 to_id = 3;
  string msg = 4; // 对于文件消息，msg字段存储file_hash
  string msg_type = 5; // text, image, gif, file
  string timestamp = 6;
  string real_file_name = 7; // 仅对文件生效，为了保证到达时文件名可以复原
}

message GroupPostDelivery {
  int64 target_user_id = 1;
  Post post = 2;
}
