syntax='proto3';
package df_interface;
option go_package = "Betterfly2/proto/data_forwarding";

import "data_forwarding/common.proto";
import "data_forwarding/request.proto";
import "data_forwarding/response.proto";
import "call/call_interface.proto";
import "push/push_interface.proto";

message RequestMessage {
  string jwt = 1;
  reserved 11;
  reserved "file_request";
  oneof payload {
    LoginReq login = 2;
    SignupReq signup = 3;
    LogoutReq logout = 4;
    Post post = 5;
    QueryUser query_user = 6;
    InsertContact insert_contact = 7;
    QueryGroup query_group = 8;
    InsertGroup insert_group = 9;
    InsertGroupUser insert_group_user = 10;
    UpdateAvatar update_avatar = 12;
    QueryMessage query_message = 13;
    QuerySyncMessages query_sync_messages = 14;
    UpdateUserName update_user_name = 15;
    UpdateUserAvatar update_user_avatar = 16;
    QueryContacts query_contacts = 17;
    DeleteContact delete_contact = 18;
    UpdateContactAlias update_contact_alias = 19;
    UpdateContactNotify update_contact_notify = 20;
    QueryGroupMembers query_group_members = 21;
    DeleteGroupUser delete_group_user = 22;
    QueryJoinedGroups query_joined_groups = 23;
    call_interface.ClientRequest call_request = 24;
    push_interface.ClientRequest push_request = 25;
    QueryFriendRequests query_friend_requests = 26;
    ResolveFriendRequest resolve_friend_request = 27;
    QueryGroupJoinRequests query_group_join_requests = 28;
    ResolveGroupJoinRequest resolve_group_join_request = 29;
    InviteGroupMember invite_group_member = 30;
    QueryGroupInvitations query_group_invitations = 31;
    ResolveGroupInvitation resolve_group_invitation = 32;
    KickGroupMember kick_group_member = 33;
    UpdateGroupMemberRole update_group_member_role = 34;
  }
}

message ResponseMessage {
  reserved 5;
  reserved "file_response";
  oneof payload {
    LoginRsp login = 1;
    SignupRsp signup = 2;
    Refused refused = 3;
    Server server = 4;
    Post post = 6;
    Warn warn = 7;
    UserInfo user_info = 8;
    GroupInfo group_info = 9;
    MessageRsp message_rsp = 10;
    SyncMessagesRsp sync_msgs_rsp = 11;
    ContactListRsp contact_list_rsp = 12;
    GroupMembersRsp group_members_rsp = 13;
    JoinedGroupsRsp joined_groups_rsp = 14;
    PostAckRsp post_ack_rsp = 15;
    call_interface.CallEvent call_event = 16;
    push_interface.ClientEvent push_event = 17;
    RelationshipRequestListRsp relationship_request_list_rsp = 18;
    RelationshipOperationRsp relationship_operation_rsp = 19;
    GroupMemberOperationRsp group_member_operation_rsp = 20;
  }
}
