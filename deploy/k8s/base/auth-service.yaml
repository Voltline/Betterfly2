apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: betterfly2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: betterfly2/auth-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "50051"
            - name: PGSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: betterfly2-secret
                  key: PGSQL_DSN
          ports:
            - name: grpc
              containerPort: 50051
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: betterfly2
spec:
  selector:
    app: auth-service
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
