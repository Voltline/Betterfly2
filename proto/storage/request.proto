syntax = "proto3";
package storage_interface;
option go_package = "Betterfly2/proto/storage";

message StoreNewMessage {
  int64 from_user_id = 1;
  int64 to_user_id = 2;
  string content = 3;
  string message_type = 4; // text, image, gif, file, audio, video, link
  bool is_group = 5;
  string real_file_name = 6;
  string client_message_id = 7;
  string client_timestamp = 8;
}

message QueryMessage {
  int64 message_id = 1;
}

message RecallMessage {
  int64 message_id = 1;
}

message QuerySyncMessages {
  int64 to_user_id = 1;
  string timestamp = 2;
  int32 page_size = 3;
  string cursor_timestamp = 4;
  int64 cursor_message_id = 5;
}

message UpdateUserName {
  int64 user_id = 1;
  string new_user_name = 2;
}

message UpdateUserAvatar {
  int64 user_id = 1;
  string new_avatar_url = 2;
}

message QueryUser {
  int64 user_id = 1;  // 要查询的用户ID
}

message QueryFileExists {
  string file_hash = 1;  // 文件SHA512哈希值
}
