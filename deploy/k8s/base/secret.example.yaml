apiVersion: v1
kind: Secret
metadata:
  name: betterfly2-secret
  namespace: betterfly2
type: Opaque
stringData:
  PGSQL_DSN: "host=postgres.example.com user=betterfly password=change-me dbname=betterfly port=5432 sslmode=disable"
  RUSTFS_ACCESS_KEY: rustfsadmin
  RUSTFS_SECRET_KEY: rustfsadmin
  TURN_SHARED_SECRET: change-me-to-a-strong-random-secret
  APNS_PRIVATE_KEY_BASE64: replace-with-base64-encoded-p8-content
  PUSH_ADMIN_TOKEN: replace-with-a-long-random-admin-token
  ABTEST_ADMIN_TOKEN: replace-with-a-long-random-admin-token
